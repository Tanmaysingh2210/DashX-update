  <!-- ── JSON-LD: FAQ — AEO (Answer Engine Optimization) ──
       AI engines like Perplexity, ChatGPT, Gemini extract Q&A pairs
       from FAQ schema to answer user queries directly.               ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is DashX?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "DashX is a free developer dashboard that combines your GitHub contribution history and LeetCode submission data into a single unified activity heatmap. It tracks coding streaks across both platforms, calculates consistency scores, and generates a shareable public profile URL you can add to your resume."
        }
      },
      {
        "@type": "Question",
        "name": "How does DashX track coding streaks?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "DashX merges daily GitHub contributions and LeetCode submissions into a single timeline. A streak day counts if you had any activity on either platform — so a day where you only solved LeetCode problems still counts toward your streak, even if you made no GitHub commits. This gives a more accurate picture of coding consistency than either platform alone."
        }
      },
      {
        "@type": "Question",
        "name": "Can I share my DashX profile with recruiters?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Every DashX user gets a public profile URL at dashx.aalsicoders.in/u/YourGitHubUsername. This page shows your activity heatmap, current streak, best streak, consistency score, and GitHub and LeetCode stats — no login required to view it. You can add this link to your resume or LinkedIn profile."
        }
      },
      {
        "@type": "Question",
        "name": "Is DashX free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, DashX is completely free. Sign in with your GitHub account, add your LeetCode username, and your dashboard is ready. Data syncs automatically every 24 hours."
        }
      },
      {
        "@type": "Question",
        "name": "How does DashX sync GitHub and LeetCode data?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "DashX uses the GitHub GraphQL API to fetch your contribution calendar and the LeetCode GraphQL API to fetch your submission history. On first login, it pulls your full history going back to account creation. After that, it syncs automatically every 24 hours — only fetching the current year's data for efficiency."
        }
      },
      {
        "@type": "Question",
        "name": "What does the DashX heatmap show?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The DashX heatmap shows 12 months of daily coding activity color-coded by platform: green cells indicate GitHub-only activity, orange cells indicate LeetCode-only submissions, and purple cells indicate days where you were active on both platforms. Cell intensity increases with the number of contributions or submissions that day."
        }
      },
      {
        "@type": "Question",
        "name": "Does DashX count private GitHub repository commits?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "DashX uses the GitHub contribution calendar API which includes commits to private repositories that you own, matching what GitHub shows on your own profile page. Commits to organization private repositories may not be included unless your GitHub account has the appropriate access."
        }
      }
    ]
  }
  </script>
